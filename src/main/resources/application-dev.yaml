spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/oquefiz}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true


springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

api:
  secutiry:
    token:
      secret: ${JWT_SECRET}
